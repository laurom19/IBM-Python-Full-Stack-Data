services:
  minio:
    # Esta versión tiene la interfaz clásica con todas las opciones a la izquierda
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: mi-nube-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./datos_minio:/data
    command: server /data --console-address ":9001"