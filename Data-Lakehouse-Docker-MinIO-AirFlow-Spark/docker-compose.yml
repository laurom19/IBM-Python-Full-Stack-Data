services:
  # --- Almacenamiento ---
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Consola Web
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    volumes:
      - ./minio_data:/data   #Carpeta que crea sino existe una
    command: server /data --console-address ":9001"

  # --- Base de Datos (INDISPENSABLE) ---
  postgres:
    image: postgres:13
    container_name: airflow-db
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Inicialización de Base de Datos ---
  airflow-init:
    image: apache/airflow:2.7.0
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname Lauro --lastname IT --role Admin --email lauro@ejemplo.com --password admin"

  airflow-webserver:
    #image: apache/airflow:2.7.0
    build: .
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully # <--- CAMBIO CLAVE
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-amazon pyspark findspark
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./scripts:/opt/airflow/scripts
    ports:
      - "8082:8080"
    command: webserver

  airflow-scheduler:
    #image: apache/airflow:2.7.0
    build: .              # <-- Agregá esto hace que lea el dockerfile que contiene el java ya 
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully # <--- CAMBIO CLAVE
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - _PIP_ADDITIONAL_REQUIREMENTS=apache-airflow-providers-amazon pyspark findspark
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./scripts:/opt/airflow/scripts
    command: scheduler

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    user: root # Agregamos esto para evitar problemas de permisos iniciales
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --ip spark-master --port 7077 --webui-port 8080
    environment:
      - SPARK_MODE=master
    ports:
      - "8083:8080"
      - "7077:7077"

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    user: root
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master

